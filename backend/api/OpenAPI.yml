openapi: 3.0.3
info:
  title: Banking Application API
  version: 2.4.0
  description: |
    REST API for a banking application with:
    - JWT authentication
    - customer registration and login
    - employee approval workflow
    - account management
    - separate transfer, deposit, and withdrawal creation endpoints
    - transaction history and filtering
    - short-lived JWT access tokens
    - refresh token rotation via secure HttpOnly cookie
    - JSON request and response bodies
    - pagination support for collection endpoints

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://bankapp.jxyden.dev/api
    description: Online host for the application and API

tags:
  - name: Auth
  - name: Users
  - name: Customers
  - name: Accounts
  - name: Transactions

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        path:
          type: string
          example: /api/auth/register

    PageMetadata:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 143
        totalPages:
          type: integer
          example: 8

    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - phoneNumber
        - bsnNumber
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          example: SecurePassword123!
        phoneNumber:
          type: string
          example: "+31612345678"
        bsnNumber:
          type: string
          example: "123456789"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          example: SecurePassword123!

    AuthResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 900
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 900

    UserResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - phoneNumber
        - bsnNumber
        - role
        - approved
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        phoneNumber:
          type: string
          example: "+31612345678"
        bsnNumber:
          type: string
          example: "123456789"
        role:
          type: string
          enum: [CUSTOMER, EMPLOYEE]
        approved:
          type: boolean
          example: false
        approvedAt:
          type: string
          format: date-time
          nullable: true
        approvedByUserId:
          type: integer
          format: int64
          nullable: true
          example: 10
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerSummaryResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - approved
      properties:
        id:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        approved:
          type: boolean
          example: true

    CustomerIbanLookupResponse:
      type: object
      description: |
        Lightweight lookup result returned to customers.
        This response intentionally contains only the customer's name and IBAN.
        It does not expose full customer profile data.
      required:
        - firstName
        - lastName
        - iban
      properties:
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Smith
        iban:
          type: string
          example: NL34INHO0009876543

    AccountResponse:
      type: object
      required:
        - id
        - iban
        - userId
        - accountType
        - balance
        - absoluteTransferLimit
        - dailyTransferLimit
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          example: 1001
        iban:
          type: string
          example: NL12INHO0001234567
        userId:
          type: integer
          format: int64
          example: 1
        accountType:
          type: string
          enum: [CHECKING, SAVINGS]
        balance:
          type: number
          format: double
          example: 1500.00
        absoluteTransferLimit:
          type: number
          format: double
          example: -500.00
        dailyTransferLimit:
          type: number
          format: double
          example: 1000.00
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TransactionResponse:
      type: object
      description: |
        A recorded transaction. The nullable account fields have a fixed meaning per transaction type:
        - TRANSFER: `fromAccountId` is the debited account and `toAccountId` is the credited account when the destination is an internal account.
        - DEPOSIT: `toAccountId` is the credited account and `fromAccountId` is null.
        - WITHDRAWAL: `fromAccountId` is the debited account and `toAccountId` is null.
      required:
        - id
        - amount
        - currency
        - transactionType
        - timestamp
      properties:
        id:
          type: integer
          format: int64
          example: 5001
        fromAccountId:
          type: integer
          format: int64
          nullable: true
          description: Set for TRANSFER and WITHDRAWAL transactions; null for DEPOSIT transactions.
          example: 1001
        toAccountId:
          type: integer
          format: int64
          nullable: true
          description: Set for DEPOSIT transactions and internal TRANSFER transactions; null for WITHDRAWAL transactions.
          example: 1002
        amount:
          type: number
          format: double
          description: Positive transaction amount.
          example: 250.00
        currency:
          type: string
          description: ISO 4217 currency code.
          example: EUR
        transactionType:
          type: string
          enum: [TRANSFER, DEPOSIT, WITHDRAWAL]
          description: Recorded type of the transaction. For creation, this type is derived from the POST endpoint.
        initiatedByUserId:
          type: integer
          format: int64
          nullable: true
          description: User who initiated the transaction, if known.
          example: 1
        channel:
          type: string
          enum: [WEB, ATM, EMPLOYEE]
          description: Channel through which the transaction was initiated.
          example: WEB
        timestamp:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
          example: Monthly savings transfer

    TransferTransactionRequest:
      type: object
      description: |
        Request body for `POST /transactions/transfers`.
        Creates a TRANSFER transaction. The client does not send `transactionType`; the type is derived from the endpoint.
        A transfer debits `fromAccountId` and credits exactly one destination: either `toAccountId` or `destinationIban`.
      required:
        - fromAccountId
        - amount
        - channel
      oneOf:
        - required:
            - toAccountId
        - required:
            - destinationIban
      properties:
        fromAccountId:
          type: integer
          format: int64
          description: Account that will be debited.
          example: 1001
        toAccountId:
          type: integer
          format: int64
          description: Internal destination account. Use this for transfers to an account known by account ID.
          example: 1002
        destinationIban:
          type: string
          description: Destination IBAN. Use this instead of `toAccountId` for IBAN-based transfers.
          example: NL34INHO0009876543
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Positive amount to transfer.
          example: 100.00
        channel:
          type: string
          enum: [WEB, ATM, EMPLOYEE]
          description: Channel through which the transfer is initiated. Business rules determine which channels are allowed for each user role.
          example: WEB
        description:
          type: string
          nullable: true
          example: Move to savings

    DepositTransactionRequest:
      type: object
      description: |
        Request body for `POST /transactions/deposits`.
        Creates a DEPOSIT transaction. The client does not send `transactionType`; the type is derived from the endpoint.
        A deposit credits `toAccountId`; `fromAccountId` is not accepted in this request.
      required:
        - toAccountId
        - amount
        - channel
      properties:
        toAccountId:
          type: integer
          format: int64
          description: Account that will be credited.
          example: 1001
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Positive amount to deposit.
          example: 50.00
        channel:
          type: string
          enum: [WEB, ATM, EMPLOYEE]
          description: Channel through which the deposit is initiated. Business rules determine which channels are allowed for each user role.
          example: ATM
        description:
          type: string
          nullable: true
          example: Cash deposit

    WithdrawalTransactionRequest:
      type: object
      description: |
        Request body for `POST /transactions/withdrawals`.
        Creates a WITHDRAWAL transaction. The client does not send `transactionType`; the type is derived from the endpoint.
        A withdrawal debits `fromAccountId`; `toAccountId` is not accepted in this request.
      required:
        - fromAccountId
        - amount
        - channel
      properties:
        fromAccountId:
          type: integer
          format: int64
          description: Account that will be debited.
          example: 1001
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Positive amount to withdraw.
          example: 75.00
        channel:
          type: string
          enum: [WEB, ATM, EMPLOYEE]
          description: Channel through which the withdrawal is initiated. Business rules determine which channels are allowed for each user role.
          example: ATM
        description:
          type: string
          nullable: true
          example: ATM withdrawal

    UpdateCustomerApprovalRequest:
      type: object
      required:
        - approved
        - checkingAbsoluteTransferLimit
        - checkingDailyTransferLimit
        - savingsAbsoluteTransferLimit
        - savingsDailyTransferLimit
      properties:
        approved:
          type: boolean
          example: true
        checkingAbsoluteTransferLimit:
          type: number
          format: double
          example: -500.00
        checkingDailyTransferLimit:
          type: number
          format: double
          example: 1000.00
        savingsAbsoluteTransferLimit:
          type: number
          format: double
          example: 0.00
        savingsDailyTransferLimit:
          type: number
          format: double
          example: 5000.00

    UpdateAccountRequest:
      type: object
      properties:
        absoluteTransferLimit:
          type: number
          format: double
          example: -250.00
        dailyTransferLimit:
          type: number
          format: double
          example: 1500.00
        isActive:
          type: boolean
          example: false

    PagedCustomerSummaryResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerSummaryResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    PagedCustomerIbanLookupResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerIbanLookupResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    PagedAccountResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    PagedTransactionResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer
      description: |
        Registers a customer.
        The customer is created as not yet approved.
        After registration, the customer can log in but cannot use full banking features until approved by an employee.

        Authorization rules:
        - Public endpoint; no existing access token is required.
        - Registration always creates a CUSTOMER user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Customer registered successfully
          headers:
            Location:
              description: URL of the created customer resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer already exists with same email or BSN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user and return access token
      description: |
        Authenticates the user and returns a short-lived access token.
        A refresh token is set by the server in a secure HttpOnly cookie.

        Authorization rules:
        - Public endpoint; no existing access token is required.
        - Available to existing CUSTOMER and EMPLOYEE users with valid credentials.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          headers:
            Set-Cookie:
              description: Secure HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Issues a new access token using the refresh token stored in a secure HttpOnly cookie.

        Authorization rules:
        - Public endpoint with respect to bearer authentication.
        - Requires a valid refresh token cookie issued by the server.
      security: []
      responses:
        '200':
          description: New access token issued successfully
          headers:
            Set-Cookie:
              description: Optional rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Missing, invalid, or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      description: |
        Invalidates the refresh token and clears the refresh token cookie.

        Authorization rules:
        - Public endpoint with respect to bearer authentication.
        - Operates on the refresh token cookie presented by the client.
      security: []
      responses:
        '204':
          description: Logout successful
          headers:
            Set-Cookie:
              description: Clears the refresh token cookie
              schema:
                type: string

  /users/me:
    get:
      tags: [Users]
      summary: Get current logged-in user
      description: |
        Returns the profile of the currently authenticated user.

        Authorization rules:
        - Requires a valid bearer token.
        - Available to authenticated CUSTOMER and EMPLOYEE users.
        - Returns only the authenticated user's own profile.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers:
    get:
      tags: [Customers]
      summary: List customers
      description: |
        Returns a paginated list of customers.

        Authorization rules:
        - Requires EMPLOYEE role.
        - Customers are not allowed to list all customers.
      parameters:
        - name: approved
          in: query
          required: false
          schema:
            type: boolean
          description: Filter customers by approval status
        - name: firstName
          in: query
          required: false
          schema:
            type: string
        - name: lastName
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: createdAt,desc
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/lookup:
    get:
      tags: [Customers]
      summary: Search customer IBAN by first name and last name
      description: |
        Returns paginated IBAN lookup results for customers matching the provided first name and last name.

        Authorization rules:
        - Requires CUSTOMER role.
        - Customers may use this endpoint only to retrieve lookup information, not full customer profiles.

        Search options based on requirements:
        - firstName
        - lastName
      parameters:
        - name: firstName
          in: query
          required: true
          schema:
            type: string
        - name: lastName
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: lastName,asc
      responses:
        '200':
          description: Matching customer IBAN results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerIbanLookupResponse'
        '400':
          description: Missing search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/pending:
    get:
      tags: [Customers]
      summary: List customers awaiting approval
      description: |
        Returns a paginated list of customers who have registered but have not yet been approved.

        Authorization rules:
        - Requires EMPLOYEE role.
        - Customers are not allowed to view pending approvals.
      parameters:
        - name: firstName
          in: query
          required: false
          schema:
            type: string
        - name: lastName
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: createdAt,asc
      responses:
        '200':
          description: Pending customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}:
    get:
      tags: [Customers]
      summary: Get customer details
      description: |
        Returns the full profile of a specific customer.

        Authorization rules:
        - Requires EMPLOYEE role.
        - Customers may not retrieve another customer's full profile through this endpoint.
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/approval:
    patch:
      tags: [Customers]
      summary: Approve a customer and create accounts
      description: |
        Updates the approval state of a customer.
        When a customer is approved, both a checking account and a savings account are created.

        Authorization rules:
        - Requires EMPLOYEE role.
        - Customers may not approve themselves or other customers.
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerApprovalRequest'
      responses:
        '200':
          description: Customer approval updated and accounts created
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/UserResponse'
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountResponse'
        '400':
          description: Invalid approval request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer already approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts visible to the current user
      description: |
        Returns a paginated list of accounts visible to the authenticated user.

        Authorization rules:
        - Customers may view only accounts that belong to themselves.
        - Employees may view all accounts.
        - The optional userId filter is intended for EMPLOYEE users.
        - Unapproved customers should not receive active banking account data through this endpoint.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Optional employee-only filter by customer ID
        - name: accountType
          in: query
          required: false
          schema:
            type: string
            enum: [CHECKING, SAVINGS]
        - name: iban
          in: query
          required: false
          schema:
            type: string
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: createdAt,desc
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{accountId}:
    get:
      tags: [Accounts]
      summary: Get account details
      description: |
        Returns account details for the specified account.

        Authorization rules:
        - Customers may view only accounts that belong to themselves.
        - Employees may view any customer account.
        - If the authenticated user is not allowed to view the account, the API returns 403 Forbidden
          or 404 Not Found depending on the application's security policy.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Accounts]
      summary: Partially update an account
      description: |
        Partially updates account settings such as transfer limits or active status.

        Authorization rules:
        - Requires EMPLOYEE role.
        - Customers may not update account limits or account status through this endpoint.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          description: Invalid account update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      description: |
        Returns a paginated list of transactions visible to the authenticated user.
        This endpoint is read-only. New transactions are created through the type-specific endpoints:
        - `POST /transactions/transfers` for TRANSFER transactions
        - `POST /transactions/deposits` for DEPOSIT transactions
        - `POST /transactions/withdrawals` for WITHDRAWAL transactions

        Transaction type meaning:
        - TRANSFER moves money from a source account to an internal account or destination IBAN.
        - DEPOSIT adds money to a target account.
        - WITHDRAWAL removes money from a source account.

        Authorization rules:
        - Customers may view only transactions related to their own accounts.
        - Employees may view all transactions in the system.
        - The optional customerId filter is intended for EMPLOYEE users.

        Search and filter options:
        - startDate
        - endDate
        - amountEq
        - amountLt
        - amountGt
        - iban
        - transactionType
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: amountEq
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Filter transactions equal to a specific amount
        - name: amountLt
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Filter transactions less than a specific amount
        - name: amountGt
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Filter transactions greater than a specific amount
        - name: iban
          in: query
          required: false
          schema:
            type: string
          description: Filter transactions to or from a specific IBAN
        - name: customerId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Optional employee-only filter by customer ID
        - name: transactionType
          in: query
          required: false
          schema:
            type: string
            enum: [TRANSFER, DEPOSIT, WITHDRAWAL]
          description: Filter by recorded transaction type. For creating transactions, use the dedicated POST endpoint for that type.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: timestamp,desc
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/transfers:
    post:
      tags: [Transactions]
      operationId: createTransferTransaction
      summary: Create a transfer transaction
      description: |
        Creates a TRANSFER transaction.

        Required request fields:
        - `fromAccountId`
        - `amount`
        - `channel`
        - exactly one destination: `toAccountId` or `destinationIban`

        Authorization and business rules:
        - Requires a valid bearer token.
        - Customers may create transfers only from accounts they own.
        - Employees may create employee-initiated transfers according to business rules.
        - Account ownership, active account status, approval status, daily limits and absolute transfer limits are enforced by the backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferTransactionRequest'
            examples:
              internalTransfer:
                summary: Transfer to an internal account
                value:
                  fromAccountId: 1001
                  toAccountId: 1002
                  amount: 100.00
                  channel: WEB
                  description: Move to savings
              ibanTransfer:
                summary: Transfer to a destination IBAN
                value:
                  fromAccountId: 1001
                  destinationIban: NL34INHO0009876543
                  amount: 25.50
                  channel: WEB
                  description: Payment request
      responses:
        '201':
          description: Transfer transaction created successfully
          headers:
            Location:
              description: URL of the created transaction resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid transfer request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source account or destination account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Transfer conflicts with business rules such as account limits or insufficient balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/deposits:
    post:
      tags: [Transactions]
      operationId: createDepositTransaction
      summary: Create a deposit transaction
      description: |
        Creates a DEPOSIT transaction.

        Required request fields:
        - `toAccountId`
        - `amount`
        - `channel`

        Authorization and business rules:
        - Requires a valid bearer token.
        - Customers may create deposits only for accounts they are allowed to use.
        - Employees may create employee-initiated deposits according to business rules.
        - Account ownership, active account status and approval status are enforced by the backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositTransactionRequest'
            examples:
              atmDeposit:
                summary: Deposit cash into an account
                value:
                  toAccountId: 1001
                  amount: 50.00
                  channel: ATM
                  description: Cash deposit
      responses:
        '201':
          description: Deposit transaction created successfully
          headers:
            Location:
              description: URL of the created transaction resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid deposit request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Target account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deposit conflicts with business rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/withdrawals:
    post:
      tags: [Transactions]
      operationId: createWithdrawalTransaction
      summary: Create a withdrawal transaction
      description: |
        Creates a WITHDRAWAL transaction.

        Required request fields:
        - `fromAccountId`
        - `amount`
        - `channel`

        Authorization and business rules:
        - Requires a valid bearer token.
        - Customers may create withdrawals only from accounts they own.
        - Employees may create employee-initiated withdrawals according to business rules.
        - Account ownership, active account status, approval status, daily limits, absolute transfer limits and available balance are enforced by the backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalTransactionRequest'
            examples:
              atmWithdrawal:
                summary: Withdraw cash from an account
                value:
                  fromAccountId: 1001
                  amount: 75.00
                  channel: ATM
                  description: ATM withdrawal
      responses:
        '201':
          description: Withdrawal transaction created successfully
          headers:
            Location:
              description: URL of the created transaction resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid withdrawal request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Withdrawal conflicts with business rules such as account limits or insufficient balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get transaction details
      description: |
        Returns the details of a specific transaction.

        Authorization rules:
