spring.datasource.url=jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.profiles.active=test
app.security.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.security.jwt.access-token-expiration-seconds=900
app.security.jwt.refresh-token-expiration-seconds=604800

