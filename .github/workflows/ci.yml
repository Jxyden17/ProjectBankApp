name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run backend tests
        id: backend_tests
        run: ./mvnw test

      - name: Print backend test summary
        if: always()
        run: |
          echo "Backend test step outcome: ${{ steps.backend_tests.outcome }}"
          if [ -d target/surefire-reports ]; then
            echo "Surefire summaries:"
            grep -H "Tests run:" target/surefire-reports/*.txt || true
          else
            echo "No Surefire reports directory was generated."
          fi

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
